[brand]
app_name = "Savant"
company_name = "Savant"
page_icon = "📘"
logo_path = "assets/logo.png"
sidebar_title = "Savant Assistant"
sidebar_caption = "Quick answers from your organization's knowledge base."
footer_text = "Savant • v1.0 • Powered by AI"
primary_color = "#1B4F72"

[contact]
hr_email = "hr@savant.internal"
feedback_url = "https://docs.google.com/forms/d/e/1FAIpQLSc31lOd_KRn9mpffhQNwuthyzh1b3KTSeMGpb12hdJQ5IT_hQ/viewform?usp=dialog"

[onboarding]
role_question = "What's your role?"
tenure_question = "How long have you been with the company?"
role_options = ["Manager", "Individual Contributor", "New Hire", "Other"]
tenure_options = ["New Hire (0–30 days)", "1–6 Months", "6+ Months", "2+ Years"]

[assistant]
welcome_message = "Hi there! I'm your Knowledge Assistant. You can ask me anything about:"
topics = ["Company policies", "Onboarding & procedures", "Tools & systems", "Processes & workflows"]
sample_questions = [
    "What is our onboarding process?",
    "How do I submit a request?",
    "Where can I find the policy on X?"
]
fallback_message = "I couldn't find a strong match in the documents. Please try rephrasing or contact your administrator."
chat_placeholder = "Ask me anything about your organization's knowledge base..."

[storage]
s3_docs_bucket = "innovim-hr-docs-1"
